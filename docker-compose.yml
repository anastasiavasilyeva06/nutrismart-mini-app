version: "3.9"

services:
  backend:
    working_dir: /app/backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
    command: ["sh", "-lc", "npm install && npm run db:generate && npm run db:migrate && npm run dev"]

  frontend:
    working_dir: /app/frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE=/api
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - backend
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 3000"]

